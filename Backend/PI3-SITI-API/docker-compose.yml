services:

  # ─── Banco de Dados MySQL ───────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: siti-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: siti_db
      MYSQL_USER: ${DB_USER:-siti_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-siti_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/create_db.sql:/docker-entrypoint-initdb.d/01_create_db.sql
      - ./database/procedures.sql:/docker-entrypoint-initdb.d/02_procedures.sql
      - ./database/seed_completo.sql:/docker-entrypoint-initdb.d/03_seed_completo.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_secret}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── API Spring Boot ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siti-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER:-siti_user}
      DB_PASSWORD: ${DB_PASSWORD:-siti_pass}
    ports:
      - "8080:8080"

volumes:
  mysql_data:
    driver: local
